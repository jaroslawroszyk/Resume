name: Build LaTeX CV
on: [push]
jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: src/Jaroslaw_Roszyk_CV.tex
          compiler: xelatex 
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: CV_PDF
          path: src/Jaroslaw_Roszyk_CV.pdf