name: Build LaTeX CV
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: src/Jaroslaw_Roszyk_CV.tex
          compiler: xelatex
          args: "-output-directory=. -jobname=Jaroslaw_Roszyk_CV -pdf -xelatex"

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: Jaroslaw_Roszyk_CV.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}